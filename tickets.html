  <meta charset="UTF-8">

</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">PSquare Art Gallery</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>

  <div class="page-container">
    <h1>Ticket Office</h1>
    <p>Select ticket type and number of tickets:</p>

    <div class="ticket-box">
      <label>Adults (₹150)</label>
      <input type="number" id="adultQty" min="0" value="0">

      <label>Students (₹80)</label>
      <input type="number" id="studentQty" min="0" value="0">

      <label>Children (₹50)</label>
      <input type="number" id="childQty" min="0" value="0">

      <button class="btn" onclick="calculateTotal()">Calculate Total</button>

      <h2>Total: ₹<span id="totalPrice">0</span></h2>
    </div>
  </div>

  <script src="js/script.js"></script>
